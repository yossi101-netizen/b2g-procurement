name: Daily B2G Tender Ingest + Telegram Alert

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests selectolax

      - name: Download latest tenders.db (if exists in repo)
        run: |
          if [ -f tenders.db ]; then
            echo "Using existing tenders.db from repo"
          else
            echo "Starting with fresh database"
          fi

      - name: Run tender ingest
        run: |
          cd T-tools
          python procurement_ingest.py ingest

      - name: Check for new MATCH tenders and send Telegram alert
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 << 'EOF'
          import sqlite3
          import os
          import urllib.request
          import json
          from datetime import datetime

          DB_PATH = "tenders.db"

          if not os.path.exists(DB_PATH):
              print("No database found")
              exit(0)

          try:
              conn = sqlite3.connect(DB_PATH)
              cursor = conn.cursor()

              today = datetime.utcnow().strftime("%Y-%m-%d")
              cursor.execute("""
                  SELECT tender_id, title, category, deadline, url
                  FROM tenders
                  WHERE keyword_verdict='MATCH'
                  AND DATE(last_updated) = ?
                  ORDER BY deadline ASC
                  LIMIT 10
              """, (today,))

              new_tenders = cursor.fetchall()
              conn.close()

              if not new_tenders:
                  print("No new MATCH tenders today")
                  exit(0)

              token = os.environ.get("TELEGRAM_TOKEN", "")
              chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")

              if not token or not chat_id:
                  print(f"Telegram secrets not configured (token={'set' if token else 'missing'}, chat_id={'set' if chat_id else 'missing'})")
                  exit(1)

              message = f"B2G Tender Alert - {len(new_tenders)} NEW MATCH Tenders\n\n"

              for tid, title, cat, deadline, url in new_tenders:
                  deadline_str = deadline if deadline else "No deadline"
                  message += f"[{tid}] {title}\n"
                  message += f"  Category: {cat} | Deadline: {deadline_str}\n"
                  message += f"  {url}\n\n"

              message += f"Checked: {datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')}"

              api_url = f"https://api.telegram.org/bot{token}/sendMessage"
              data = json.dumps({
                  "chat_id": chat_id,
                  "text": message
              }).encode("utf-8")

              req = urllib.request.Request(api_url, data=data, headers={"Content-Type": "application/json"})
              response = urllib.request.urlopen(req)
              result = json.loads(response.read().decode())

              if result.get("ok"):
                  print(f"Telegram alert sent: {len(new_tenders)} new tenders")
              else:
                  print(f"Telegram API error: {result.get('description')}")

          except Exception as e:
              print(f"Error: {e}")
              exit(1)
          EOF

      - name: Commit and push updated database
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "B2G Tender Bot"
          git add tenders.db || true
          git commit -m "chore: update tenders database - $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No database changes"
          git push || echo "Nothing to push"
        if: always()
