# PRICING GUIDANCE FOR QUOTE ENGINE
# ─────────────────────────────────────────────────────────────────
pricing_guidance:
  # STEP 1: Run India-manufactured items only through calculator
  # Notebook ($19) at 50 units + box/tissue/ribbon ($2) = $21
  calculator_fob_reference_usd:
    "50-99_units":   21.00
    "100-199_units": 17.00
    "200-499_units": 13.50
  recommended_packaging_type: "branded"

  # STEP 2: Add local-sourced costs manually
  local_sourced_ils_per_unit:
    honey_jar_at_50:   22    # Meshek Milman / Ayelet Honey, locked pre-July
    wooden_stick:       0    # Included by Tier 1 suppliers
    greeting_card:     12
    wax_seal_stamp:     3    # Amortised over batch
    assembly_labor:    20
    total_at_50_units: 57

  # STEP 3: Target retail
  recommended_currency: "ILS"
  target_retail_ils_per_unit: 350
  total_cost_note: >
    Calculator result (in ILS) + ₪57 local = total delivered cost.
    Set target retail at ₪350 to maintain strong GP after all costs.

  competitor_benchmarks:
    gimmick_pomegranate_vine:   "₪199–299 (knife set + honey + candle — no leather)"
    ofek_lavan_culinary:        "₪155–470 (cookware + honey — no leather)"
    delicatessen_table_edit:    "₪496 (ceramic + food only — no leather)"
    gogift_welcome_hydration:   "₪555 (Yeti + soft-touch notebook — no artisan honey, no real leather)"
    tnx_mass_tier:              "₪40 (honey + candle — mass-market baseline)"
  positioning_note: >
    At ₪350, KritiKaal sits between mass-tier (₪40–199) and luxury-food-only (₪496).
    Unique in the 2026 market: genuine leather + artisan honey + premium box at ₪350.
    No competitor provides all three at this price point.
  brand_story: >
    "The honey is sweet for a day. The notebook stays on your desk for years."
    This is the line that separates us from every food-only Rosh Hashana box.

  day45_revenue_target: >
    This product is the Day 45 milestone driver.
    Target: 3 accepted quotes × 50 units × ₪350 = ₪52,500 cleared by Day 45.
    5 quotes issued = ₪87,500+ pipeline. Campaign must go live by July 2026.

